<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <!-- Background -->
  <rect width="1000" height="800" fill="#f8f9fa"/>
  
  <!-- Titles -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#212529">Skema Wiring Hybrid: Timbangan FORTERA + ESP32</text>
  <text x="500" y="70" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#495057">Panduan Tapping / Suntik Kabel Tanpa Memutus Sistem Asli</text>

  <!-- Load Cell (Bottom) -->
  <rect x="250" y="650" width="500" height="80" rx="10" fill="#adb5bd" stroke="#495057" stroke-width="3"/>
  <text x="500" y="695" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#212529">SENSOR LOAD CELL (Di Bawah Timbangan)</text>

  <!-- Fortera Indicator (Top Left) -->
  <rect x="100" y="150" width="300" height="150" rx="15" fill="#343a40" stroke="#212529" stroke-width="4"/>
  <rect x="120" y="170" width="260" height="80" fill="#000" stroke="#495057" stroke-width="2"/>
  <text x="250" y="225" font-family="Courier New, monospace" font-size="40" font-weight="bold" text-anchor="middle" fill="#f03e3e">0.00 kg</text>
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#f8f9fa">LAYAR BAWAAN FORTERA</text>

  <!-- HX711 Module (Middle Right) -->
  <!-- Modifying size to fit 6 pins on the right -->
  <rect x="580" y="250" width="160" height="230" rx="5" fill="#2b8a3e" stroke="#1864ab" stroke-width="3"/>
  <text x="660" y="280" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">HX711</text>
  
  <!-- HX711 Left Pins (ESP32 side) -->
  <circle cx="595" cy="320" r="6" fill="#ffd43b"/> <text x="610" y="325" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">VCC</text>
  <circle cx="595" cy="355" r="6" fill="#ffd43b"/> <text x="610" y="360" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">SCK</text>
  <circle cx="595" cy="390" r="6" fill="#ffd43b"/> <text x="610" y="395" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">DT</text>
  <circle cx="595" cy="425" r="6" fill="#ffd43b"/> <text x="610" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">GND</text>

  <!-- HX711 Right Pins (Load Cell side) -->
  <circle cx="725" cy="285" r="6" fill="#ffd43b"/> <text x="695" y="290" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">B+</text>
  <circle cx="725" cy="320" r="6" fill="#ffd43b"/> <text x="695" y="325" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">B-</text>
  <circle cx="725" cy="355" r="6" fill="#ffd43b"/> <text x="695" y="360" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">A+</text>
  <circle cx="725" cy="390" r="6" fill="#ffd43b"/> <text x="695" y="395" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">A-</text>
  <circle cx="725" cy="425" r="6" fill="#ffd43b"/> <text x="695" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">E-</text>
  <circle cx="725" cy="460" r="6" fill="#ffd43b"/> <text x="695" y="465" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">E+</text>

  <!-- ESP32 Module (Top Right) -->
  <rect x="830" y="150" width="130" height="250" rx="10" fill="#212529" stroke="#495057" stroke-width="3"/>
  <text x="895" y="190" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">ESP32</text>
  
  <!-- ESP32 Left Pins -->
  <circle cx="845" cy="240" r="6" fill="#ffd43b"/> <text x="860" y="245" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">3V3</text>
  <circle cx="845" cy="280" r="6" fill="#ffd43b"/> <text x="860" y="285" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">D16</text>
  <circle cx="845" cy="320" r="6" fill="#ffd43b"/> <text x="860" y="325" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">D4</text>
  <circle cx="845" cy="360" r="6" fill="#ffd43b"/> <text x="860" y="365" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">GND</text>

  <!-- Main Cable routing from Load Cell to Indicator -->
  <!-- Thick outer cable jacket -->
  <path d="M 250 650 L 250 300" fill="none" stroke="#495057" stroke-width="30" stroke-linecap="round"/>
  
  <!-- Individual wires from Load Cell to Indicator -->
  <!-- GREEN (A+) -->
  <path d="M 227 650 L 227 300 L 227 150" fill="none" stroke="#2f9e44" stroke-width="6"/>
  <!-- WHITE (A-) -->
  <path d="M 242 650 L 242 300 L 242 150" fill="none" stroke="#f1f3f5" stroke-width="6" stroke-dasharray="4,2"/>
  <!-- BLACK (E-) -->
  <path d="M 258 650 L 258 300 L 258 150" fill="none" stroke="#212529" stroke-width="6"/>
  <!-- RED (E+) -->
  <path d="M 273 650 L 273 300 L 273 150" fill="none" stroke="#e03131" stroke-width="6"/>
  
  <!-- Labels for main wires -->
  <text x="210" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#2f9e44">A+ (Hijau)</text>
  <text x="242" y="130" font-family="Arial" font-size="12" font-weight="bold" fill="#495057">A- (Putih)</text>
  <text x="278" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#212529">E- (Hitam)</text>
  <text x="310" y="130" font-family="Arial" font-size="12" font-weight="bold" fill="#e03131">E+ (Merah)</text>

  <!-- TAPPING WIRES (Splices) -->
  <!-- Junction dots -->
  <circle cx="227" cy="355" r="5" fill="#2f9e44"/>
  <circle cx="242" cy="390" r="5" fill="#868e96"/>
  <circle cx="258" cy="425" r="5" fill="#212529"/>
  
  <!-- Green tapping wire to HX711 A+ -->
  <path d="M 227 355 L 725 355" fill="none" stroke="#2f9e44" stroke-width="5" stroke-dasharray="8,4"/>
  <text x="400" y="347" font-family="Arial" font-size="14" font-weight="bold" fill="#2f9e44">Cabang Kabel Hijau (ke A+)</text>

  <!-- White tapping wire to HX711 A- -->
  <path d="M 242 390 L 725 390" fill="none" stroke="#868e96" stroke-width="5" stroke-dasharray="8,4"/>
  <text x="400" y="382" font-family="Arial" font-size="14" font-weight="bold" fill="#495057">Cabang Kabel Putih (ke A-)</text>

  <!-- Black tapping wire to HX711 E- -->
  <path d="M 258 425 L 725 425" fill="none" stroke="#212529" stroke-width="5" stroke-dasharray="8,4"/>
  <text x="400" y="417" font-family="Arial" font-size="14" font-weight="bold" fill="#212529">Cabang Kabel Hitam (ke E-)</text>
  
  <!-- RED WARNING FOR E+ -->
  <text x="450" y="465" font-family="Arial" font-size="16" font-weight="bold" fill="#e03131">❌ KOSONG (JANGAN SAMBUNG KE MERAH)</text>
  
  <!-- Wires from HX711 to ESP32 -->
  <!-- VCC to 3V3 -->
  <path d="M 595 320 L 560 320 L 560 240 L 845 240" fill="none" stroke="#e03131" stroke-width="4"/>
  <!-- SCK to D4 -->
  <path d="M 595 355 L 540 355 L 540 320 L 845 320" fill="none" stroke="#f59f00" stroke-width="4"/>
  <!-- DT to D16 -->
  <path d="M 595 390 L 520 390 L 520 280 L 845 280" fill="none" stroke="#1c7ed6" stroke-width="4"/>
  <!-- GND to GND -->
  <path d="M 595 425 L 500 425 L 500 360 L 845 360" fill="none" stroke="#212529" stroke-width="4"/>

  <!-- Notes / Legend Box -->
  <rect x="50" y="500" width="380" height="120" rx="10" fill="#fff3cd" stroke="#ffe066" stroke-width="2"/>
  <text x="70" y="530" font-family="Arial" font-size="16" font-weight="bold" fill="#854d0e">ATURAN PENTING HYBRID:</text>
  <text x="70" y="555" font-family="Arial" font-size="14" fill="#422006">1. Kabel asli dari pabrik jangan sampai terputus.</text>
  <text x="70" y="575" font-family="Arial" font-size="14" fill="#422006">2. Hanya kupas sedikit kulitnya untuk menyuntik kabel cabang.</text>
  <text x="70" y="595" font-family="Arial" font-size="14" fill="#422006">3. Layar FORTERA harus menyala agar sensor mendapat daya.</text>
</svg>
